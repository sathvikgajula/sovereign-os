name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sovereign-kernel:
    name: sovereign-kernel (bare-metal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pq-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-none, x86_64-unknown-none

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pq-core

      - name: Build aarch64 kernel (smoltcp + rx-lab)
        run: |
          cargo build -p sovereign-kernel \
            --target aarch64-unknown-none \
            --release \
            --bin sovereign-kernel \
            --features rx-lab

      - name: Build x86_64 kernel
        run: |
          cargo build -p sovereign-kernel \
            --target x86_64-unknown-none \
            --release \
            --bin sovereign-kernel

      - name: Kernel crate lib tests (host)
        run: cargo test -p sovereign-alloc -p sovereign-frame -p sovereign-hal --lib

  pq-daemon-smoke:
    name: pq-daemon smoke build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pq-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pq-core

      - name: Build pq-daemon (Linux)
        run: cargo build -p pq-daemon --release
